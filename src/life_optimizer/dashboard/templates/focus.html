{% extends "base.html" %}

{% block title %}Focus Timeline - Life Optimizer{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Focus Timeline</h1>
        <div class="flex items-center space-x-3">
            <label for="days-select" class="text-sm font-medium text-gray-700">Range:</label>
            <select id="days-select" onchange="updateFocusTimeline()"
                    class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm px-3 py-1.5 border">
                <option value="3">3 days</option>
                <option value="7" selected>7 days</option>
                <option value="14">14 days</option>
                <option value="30">30 days</option>
            </select>
        </div>
    </div>

    <!-- Category Legend -->
    <div class="flex flex-wrap gap-3 text-xs">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#10b981"></span> Deep Work</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#3b82f6"></span> Communication</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#8b5cf6"></span> Browsing</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#ef4444"></span> Social Media</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#f59e0b"></span> Entertainment</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#06b6d4"></span> Planning</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#84cc16"></span> Learning</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#ec4899"></span> Personal</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#6b7280"></span> Other</span>
    </div>

    <!-- Timeline container -->
    <div id="focus-timeline-container" class="bg-white rounded-lg shadow p-4">
        <div id="focus-timeline" class="text-center py-8 text-gray-500">Loading timeline...</div>
    </div>
</div>

<script src="/static/js/charts.js"></script>
<script>
function updateFocusTimeline() {
    const days = document.getElementById('days-select').value;
    loadFocusTimeline(days);
}

async function loadFocusTimeline(days) {
    try {
        const resp = await fetch('/api/sessions/timeline?days=' + days);
        const data = await resp.json();
        renderFocusTimeline(data.sessions || [], 'focus-timeline');
    } catch (e) {
        console.error('Failed to load focus timeline:', e);
        document.getElementById('focus-timeline').innerHTML =
            '<div class="text-center py-8 text-gray-500">Failed to load timeline data.</div>';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadFocusTimeline(7);
});
</script>
{% endblock %}
